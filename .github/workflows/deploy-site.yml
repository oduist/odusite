name: Deploy site

# Publishes the Astro site to Cloudflare Workers (production) on every push to
# main that touches the site, plus a manual trigger. Runtime secrets
# (ODUSITE_TOKEN, ODUSITE_REVALIDATE_SECRET, ...) are set once on the Worker via
# `wrangler secret put` and persist across deploys, so this workflow only needs
# the Cloudflare API credentials. Vars (ODOO_URL, PUBLIC_SITE_URL) and the KV
# binding live in site/wrangler.jsonc.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

concurrency:
  group: deploy-site
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Build (default block set)
        run: pnpm build
      - name: Deploy to Cloudflare Workers
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
